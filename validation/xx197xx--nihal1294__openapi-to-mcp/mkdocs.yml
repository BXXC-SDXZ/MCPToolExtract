site_name: OpenAPI to MCP
site_url: https://nihal1294.github.io/openapi-to-mcp/
repo_url: https://github.com/nihal1294/openapi-to-mcp
repo_name: nihal1294/openapi-to-mcp
docs_dir: docs
site_dir: site

theme:
  name: material
  favicon: images/openapi-to-mcp.png
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting Started: getting-started.md
  - Commands:
      - generate: commands/generate.md
      - run: commands/run.md
      - test-server: commands/test-server.md
      - doctor: commands/doctor.md
      - diff: commands/diff.md
  - Guides:
      - Auth and Environment: guides/auth-and-env.md
      - Customization Boundary: guides/customization.md
      - mcpgen.yaml: guides/mcpgen-policy.md
      - Generated Project: guides/generated-project.md
      - Local Workflows: guides/local-workflows.md
      - MCP Inspector: guides/mcp-inspector.md
  - Examples: examples.md
  - Extended Examples: USAGE_EXAMPLES.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
