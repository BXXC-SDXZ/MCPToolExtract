services:
  gitlab:
    image: ${GITLAB_IMAGE:-gitlab/gitlab-ce:latest}
    hostname: gitlab-e2e
    ports:
      - "8929:80"
    environment:
      GITLAB_ACTIVATION_CODE: ${GITLAB_ACTIVATION_CODE:-}
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8929'
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        gitlab_rails['monitoring_whitelist'] = ['0.0.0.0/0', '::/0']
        gitlab_rails['initial_root_password'] = 'E2e_R0ot!xK9mZ#2026'
        # Performance: handle ~40 parallel project creations without connection resets
        puma['workers'] = 4
        puma['min_threads'] = 4
        puma['max_threads'] = 8
        sidekiq['concurrency'] = 10
        postgresql['shared_buffers'] = '512MB'
        nginx['worker_connections'] = 2048
        nginx['proxy_connect_timeout'] = '120'
        nginx['proxy_read_timeout'] = '120'
        nginx['keepalive_timeout'] = '120'
        prometheus_monitoring['enable'] = false
        alertmanager['enable'] = false
        # Disable unnecessary services
        gitlab_kas['enable'] = false
        sentinel['enable'] = false
        registry['enable'] = false
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab
    shm_size: '512m'
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/-/readiness?all=1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s

  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    depends_on:
      gitlab:
        condition: service_healthy
    volumes:
      - runner-config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # e2e-ldap provides an OpenLDAP server for the groupldap_ee test.
  # The default osixia/openldap image seeds a minimal directory
  # (ou=people, ou=groups) under dc=example,dc=com at first start;
  # GitLab's LDAP group-links can then bind as
  # cn=admin,dc=example,dc=com. The password is sourced from
  # E2E_LDAP_ADMIN_PASSWORD (default "ldapadmin" for the local
  # fixture). The test user and group are simple fixture data
  # used by the suite; the suite does not modify them.
  e2e-ldap:
    image: osixia/openldap:1.5.0
    hostname: ldap-e2e
    container_name: e2e-ldap
    environment:
      LDAP_ORGANISATION: "E2E"
      LDAP_DOMAIN: "example.com"
      LDAP_ADMIN_USERNAME: "admin"
      LDAP_ADMIN_PASSWORD: ${E2E_LDAP_ADMIN_PASSWORD:-ldapadmin}
      LDAP_CONFIG_PASSWORD: ${E2E_LDAP_CONFIG_PASSWORD:-config}
      LDAP_READONLY_USER: "false"
      LDAP_RFC2307BIS_SCHEMA: "true"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "true"
      LDAP_SSL_HELPER_PREFIX: "ldap"
      LDAP_TLS: "false"
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost -b dc=example,dc=com -D \"cn=admin,dc=example,dc=com\" -w ${E2E_LDAP_ADMIN_PASSWORD:-ldapadmin} \"(objectclass=*)\" >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  e2e-fixture:
    image: nginx:alpine
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'NGINX'
        server {
          listen 8080;
          location = /hook { add_header Content-Type application/json; return 200 '{"ok":true,"endpoint":"hook"}\n'; }
          location = /hook-updated { add_header Content-Type application/json; return 200 '{"ok":true,"endpoint":"hook-updated"}\n'; }
          location = /emoji.png { root /usr/share/nginx/html; add_header Content-Type image/png; }
        }
        NGINX
        printf '%s' 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+/p9sAAAAASUVORK5CYII=' | base64 -d > /usr/share/nginx/html/emoji.png
        nginx -g 'daemon off;'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/emoji.png"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  gitlab-config:
  gitlab-logs:
  gitlab-data:
  runner-config:
