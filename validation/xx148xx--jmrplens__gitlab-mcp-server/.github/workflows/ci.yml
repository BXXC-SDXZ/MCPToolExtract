# CI pipeline for gitlab-mcp-server
#
# Runs on: pull requests to main, pushes to main
# Jobs: test, sonarcloud, build, Go analysis, markdown, docker (PR+paths)

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.26.4"
  COVERAGE_MIN: "80"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - name: Check generated llms files
        run: make check-llms
      - name: Check MCP Registry manifest
        run: make check-server-json
      - name: Check Open Plugins manifest
        run: make check-openplugin
      - name: Run tests with coverage
        run: |
          go test -count=1 -coverpkg=./cmd/...,./internal/... -coverprofile=coverage.out ./cmd/... ./internal/...
          go tool cover -func=coverage.out
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !(${COVERAGE} + 0 < ${COVERAGE_MIN} + 0)}"; then
            echo "FAIL: coverage ${COVERAGE}% is below minimum ${COVERAGE_MIN}%"
            exit 1
          fi
          echo "PASS: coverage ${COVERAGE}% meets minimum ${COVERAGE_MIN}%"
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 1

  sonarcloud:
    name: "SA: SonarCloud"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: coverage
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: site/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: "22.22.0"
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: site
      - name: Audit docs dependencies
        run: pnpm audit --audit-level=high
        working-directory: site
      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v8
        continue-on-error: true
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - run: go build -o /dev/null ./cmd/server
      - name: Verify E2E tests compile
        run: go test -tags e2e -c -o /dev/null ./test/e2e/suite/

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - run: make golangci-lint

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: make govulncheck

  analyze-md:
    name: Analyze Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22.22.0"
      - run: npx --yes markdownlint-cli2 "**/*.{md,mdx}" "#plan" "#node_modules"

  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
          ignore: DL3008,DL3018

  server-json-schema:
    name: server.json schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install jsonschema
        run: pip install --quiet jsonschema
      - name: Validate server.json against MCP Registry schema (2025-12-11)
        run: |
          set -euo pipefail
          SCHEMA_URL=$(jq -r '."$schema"' server.json)
          echo "Schema referenced by server.json: $SCHEMA_URL"
          # SSRF guard: only allow the official MCP Registry schema host.
          # Prevents an attacker from changing $schema in a PR to probe
          # arbitrary URLs from the runner.
          ALLOWED_PREFIX="https://static.modelcontextprotocol.io/"
          case "$SCHEMA_URL" in
            "$ALLOWED_PREFIX"*) ;;
            *)
              echo "::error::Schema URL must start with $ALLOWED_PREFIX (got: $SCHEMA_URL)"
              exit 1
              ;;
          esac
          curl -fsSL --proto '=https' --tlsv1.2 "$SCHEMA_URL" -o /tmp/mcp-schema.json
          python3 -c "import json,jsonschema; \
            schema=json.load(open('/tmp/mcp-schema.json')); \
            inst=json.load(open('server.json')); \
            jsonschema.validate(inst, schema); \
            print('server.json: VALID against', schema.get('\$id'))"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for Docker changes
        id: filter
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} -- Dockerfile docker-compose*.yml .dockerignore)
          if [ -n "$CHANGED" ]; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker=false" >> "$GITHUB_OUTPUT"
            echo "No Docker-related files changed — skipping build"
          fi
      - name: Compute build date
        if: steps.filter.outputs.docker == 'true'
        id: build-date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
      - name: Build Docker image
        if: steps.filter.outputs.docker == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build-date.outputs.date }}
