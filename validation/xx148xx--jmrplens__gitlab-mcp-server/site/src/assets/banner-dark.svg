<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 200" width="840" height="200">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="soft-glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="text-glow" x="-10%" y="-15%" width="120%" height="130%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0618"/>
      <stop offset="46%" stop-color="#120A25"/>
      <stop offset="100%" stop-color="#071912"/>
    </linearGradient>
    <linearGradient id="core-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D1B69"/>
      <stop offset="100%" stop-color="#1A1145"/>
    </linearGradient>
    <linearGradient id="meta-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B2780" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#21144D" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="dynamic-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#173B4F" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#12264A" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="individual-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3E2317" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#1F2841" stop-opacity="0.84"/>
    </linearGradient>
    <linearGradient id="catalog-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FC6D26" stop-opacity="0"/>
      <stop offset="16%" stop-color="#FC6D26"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="84%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="aura-left" cx="0.16" cy="0.5" r="0.32">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura-right" cx="0.83" cy="0.48" r="0.35">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura-orange" cx="0.62" cy="0.82" r="0.38">
      <stop offset="0%" stop-color="#FC6D26" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FC6D26" stop-opacity="0"/>
    </radialGradient>

    <symbol id="hex" viewBox="0 0 16 24" overflow="visible">
      <path d="M0,8 L8,4 16,8 16,16 8,20 0,16Z" fill="none" stroke="#2D1B69" stroke-width="0.45"/>
    </symbol>
    <pattern id="hex-grid" x="0" y="0" width="16" height="24" patternUnits="userSpaceOnUse">
      <use href="#hex"/>
      <use href="#hex" x="8" y="12"/>
    </pattern>
  </defs>

  <rect width="840" height="200" rx="12" fill="url(#bg-grad)"/>
  <rect width="840" height="200" rx="12" fill="url(#aura-left)"/>
  <rect width="840" height="200" rx="12" fill="url(#aura-right)"/>
  <rect width="840" height="200" rx="12" fill="url(#aura-orange)"/>
  <rect x="0" y="0" width="188" height="200" fill="url(#hex-grid)" opacity="0.28"/>
  <rect x="652" y="0" width="188" height="200" fill="url(#hex-grid)" opacity="0.24"/>

  <g transform="translate(96 100)">
    <circle r="63" fill="#A78BFA" opacity="0.08" filter="url(#soft-glow)"/>
    <circle r="58" fill="none" stroke="#3B2780" stroke-width="0.7" opacity="0.78"/>
    <circle r="47" fill="none" stroke="#6D5DD3" stroke-width="0.5" stroke-dasharray="2 5" opacity="0.58"/>
    <circle r="68" fill="none" stroke="#1A1145" stroke-width="0.45" stroke-dasharray="1 7" opacity="0.55"/>

    <g stroke="#A78BFA" stroke-width="0.55" stroke-dasharray="1.5 3" opacity="0.62">
      <line x1="0" y1="-43" x2="0" y2="-72"/>
      <line x1="0" y1="43" x2="0" y2="72"/>
      <line x1="-43" y1="0" x2="-72" y2="0"/>
      <line x1="43" y1="0" x2="90" y2="0"/>
      <line x1="-30" y1="-30" x2="-52" y2="-52"/>
      <line x1="30" y1="-30" x2="52" y2="-52"/>
      <line x1="-30" y1="30" x2="-52" y2="52"/>
      <line x1="30" y1="30" x2="52" y2="52"/>
    </g>
    <g fill="#A78BFA" filter="url(#glow)" opacity="0.9">
      <circle cx="0" cy="-72" r="1.6"/>
      <circle cx="0" cy="72" r="1.6"/>
      <circle cx="-72" cy="0" r="1.6"/>
      <circle cx="90" cy="0" r="1.7"/>
      <circle cx="-52" cy="-52" r="1.25"/>
      <circle cx="52" cy="-52" r="1.25"/>
      <circle cx="-52" cy="52" r="1.25"/>
      <circle cx="52" cy="52" r="1.25"/>
    </g>

    <rect x="-30" y="-30" width="60" height="60" rx="13" fill="url(#core-grad)" stroke="#A78BFA" stroke-width="0.7" filter="url(#glow)"/>
    <rect x="-27" y="-27" width="54" height="54" rx="11" fill="none" stroke="#A78BFA" stroke-width="0.32" opacity="0.38"/>
    <svg x="-24" y="-24" width="48" height="48" viewBox="100 100 180 180">
      <path fill="#E24329" d="M265.26416,174.37243l-.2134-.55822-21.19899-55.30908c-.4236-1.08359-1.18542-1.99642-2.17699-2.62689-.98837-.63373-2.14749-.93253-3.32305-.87014-1.1689.06239-2.29195.48925-3.20809,1.21821-.90957.73554-1.56629,1.73047-1.87493,2.85346l-14.31327,43.80662h-57.90965l-14.31327-43.80662c-.30864-1.12299-.96536-2.11791-1.87493-2.85346-.91614-.72895-2.03911-1.15582-3.20809-1.21821-1.17548-.06239-2.33468.23641-3.32297.87014-.99166.63047-1.75348,1.5433-2.17707,2.62689l-21.19891,55.31237-.21348.55493c-6.28158,16.38521-.92929,34.90803,13.05891,45.48782.02621.01641.04922.03611.07552.05582l.18719.14119,32.29094,24.17392,15.97151,12.09024,9.71951,7.34871c2.34117,1.77316,5.57877,1.77316,7.92002,0l9.71943-7.34871,15.96822-12.09024,32.48142-24.31511c.02958-.02299.05588-.04269.08538-.06568,13.97834-10.57977,19.32735-29.09604,13.04905-45.47796Z"/>
      <path fill="#FC6D26" d="M265.26416,174.37243l-.2134-.55822c-10.5174,2.16062-20.20405,6.6099-28.49844,12.81593-.1346.0985-25.20497,19.05805-46.55171,35.19699,15.84998,11.98517,29.6477,22.40405,29.6477,22.40405l32.48142-24.31511c.02958-.02299.05588-.04269.08538-.06568,13.97834-10.57977,19.32735-29.09604,13.04905-45.47796Z"/>
      <path fill="#FCA326" d="M160.34962,244.23117l15.97151,12.09024,9.71951,7.34871c2.34117,1.77316,5.57877,1.77316,7.92002,0l9.71943-7.34871,15.96822-12.09024s-13.79772-10.41888-29.6477-22.40405c-15.85327,11.98517-29.65099,22.40405-29.65099,22.40405Z"/>
      <path fill="#FC6D26" d="M143.44561,186.63014c-8.29111-6.20274-17.97446-10.65531-28.49507-12.81264l-.21348.55493c-6.28158,16.38521-.92929,34.90803,13.05891,45.48782.02621.01641.04922.03611.07552.05582l.18719.14119,32.29094,24.17392s13.79772-10.41888,29.65099-22.40405c-21.34673-16.13894-46.42031-35.09848-46.55499-35.19699Z"/>
    </svg>
  </g>

  <g font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
    <text x="196" y="48" font-size="33" font-weight="760" fill="#F5F3FF" filter="url(#text-glow)">GitLab MCP Server</text>
    <text x="198" y="72" font-size="14.5" font-weight="520" fill="#C4B5FD">Three MCP surfaces over one canonical action catalog</text>
    <text x="198" y="91" font-size="13.2" font-weight="560" fill="#A7F3D0" opacity="0.9">Complete GitLab API coverage, exposed through MCP</text>

    <g transform="translate(198 108)">
      <path d="M6 62H588" stroke="url(#catalog-line)" stroke-width="1.6" opacity="0.72"/>
      <circle cx="20" cy="62" r="2.2" fill="#FC6D26" filter="url(#glow)"/>
      <circle cx="294" cy="62" r="2.2" fill="#A78BFA" filter="url(#glow)"/>
      <circle cx="574" cy="62" r="2.2" fill="#34D399" filter="url(#glow)"/>

      <g>
        <rect x="0" y="0" width="188" height="54" rx="10" fill="url(#meta-grad)" stroke="#7C67D9" stroke-width="0.8"/>
        <text x="14" y="22" font-size="14.5" font-weight="760" fill="#F5F3FF">Meta-tools</text>
        <text x="14" y="44" font-size="17" font-weight="800" fill="#FCA326">33 / 49 / 50</text>
        <text x="112" y="43" font-size="11.5" font-weight="620" fill="#DDD6FE">tools</text>
      </g>

      <g transform="translate(201 0)">
        <rect x="0" y="0" width="188" height="54" rx="10" fill="url(#dynamic-grad)" stroke="#38BDF8" stroke-width="0.8"/>
        <rect x="12" y="10" width="48" height="17" rx="8.5" fill="#0E2438" stroke="#38BDF8" stroke-width="0.55"/>
        <text x="36" y="22" text-anchor="middle" font-size="8.8" font-weight="800" fill="#BAE6FD">DEFAULT</text>
        <text x="72" y="22" font-size="14.5" font-weight="760" fill="#F5F3FF">Dynamic</text>
        <text x="14" y="43" font-size="11.7" font-weight="650" fill="#BAE6FD">2 tools · find / execute</text>
      </g>

      <g transform="translate(402 0)">
        <rect x="0" y="0" width="188" height="54" rx="10" fill="url(#individual-grad)" stroke="#FC6D26" stroke-width="0.8"/>
        <text x="14" y="22" font-size="14.5" font-weight="760" fill="#F5F3FF">Individual</text>
        <text x="112" y="22" font-size="15" font-weight="800" fill="#FDBA74">1014+</text>
        <text x="14" y="43" font-size="11.7" font-weight="650" fill="#FED7AA">full tool projection</text>
      </g>
    </g>

    <text x="492" y="190" text-anchor="middle" font-size="10.5" font-weight="650" fill="#8B7FC7">TOOL_SURFACE=dynamic · meta · individual</text>
  </g>
</svg>
