<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none" role="img" aria-label="Agent Runway">
  <defs>
    <linearGradient id="wm-bg" x1="20" y1="0" x2="20" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e2f5e"/>
      <stop offset="100%" stop-color="#0d1526"/>
    </linearGradient>
    <linearGradient id="wm-left" x1="3" y1="9" x2="16" y2="31" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6cb4ff"/>
      <stop offset="55%"  stop-color="#2e7be6"/>
      <stop offset="100%" stop-color="#1452a8"/>
    </linearGradient>
    <linearGradient id="wm-right" x1="37" y1="9" x2="24" y2="31" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6cb4ff"/>
      <stop offset="55%"  stop-color="#2e7be6"/>
      <stop offset="100%" stop-color="#1452a8"/>
    </linearGradient>
    <linearGradient id="wm-sheen" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="wm-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#F97316" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <!-- Text gradient: blue to violet -->
    <linearGradient id="wm-text-grad" x1="50" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1E72F2"/>
      <stop offset="100%" stop-color="#6B5FF8"/>
    </linearGradient>
  </defs>

  <!-- Icon mark (40×40) -->
  <rect width="40" height="40" rx="9" fill="url(#wm-bg)"/>
  <path d="M3 9 L17.5 9 L14.5 31 L3 31 Z" fill="url(#wm-left)"/>
  <path d="M3 9 L17.5 9 L17 13 L3 12.5 Z" fill="url(#wm-sheen)"/>
  <path d="M22.5 9 L37 9 L37 31 L25.5 31 Z" fill="url(#wm-right)"/>
  <path d="M22.5 9 L37 9 L37 13.5 L23 13 Z" fill="url(#wm-sheen)"/>
  <rect x="15" y="9" width="10" height="22" fill="#0a1020" fill-opacity="0.5"/>
  <circle cx="20" cy="14" r="5" fill="url(#wm-glow)"/>
  <circle cx="20" cy="14" r="1.8" fill="#F97316"/>

  <!-- Wordmark text -->
  <!-- "AGENT" — small caps, wide tracking, muted -->
  <text
    x="50"
    y="17"
    font-family="'Inter', 'Geist Sans', 'SF Pro Display', system-ui, sans-serif"
    font-size="8.5"
    font-weight="500"
    letter-spacing="0.14em"
    fill="#8CA4C8"
    text-rendering="geometricPrecision"
  >AGENT</text>

  <!-- "RUNWAY" — bold, larger, primary color -->
  <text
    x="50"
    y="31"
    font-family="'Inter', 'Geist Sans', 'SF Pro Display', system-ui, sans-serif"
    font-size="14"
    font-weight="700"
    letter-spacing="-0.01em"
    fill="#F0F6FF"
    text-rendering="geometricPrecision"
  >RUNWAY</text>

</svg>
