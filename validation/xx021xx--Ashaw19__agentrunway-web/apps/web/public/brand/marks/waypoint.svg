
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round">
  <!-- Vertical arm -->
  <line x1="60" y1="20" x2="60" y2="100"/>
  <!-- Horizontal arm -->
  <line x1="20" y1="60" x2="100" y2="60"/>
  <!-- Tick marks on vertical arm -->
  <line x1="55" y1="35" x2="65" y2="35"/>
  <line x1="55" y1="85" x2="65" y2="85"/>
  <!-- Tick marks on horizontal arm -->
  <line x1="35" y1="55" x2="35" y2="65"/>
  <line x1="85" y1="55" x2="85" y2="65"/>
  <!-- Centre dot -->
  <circle cx="60" cy="60" r="4" fill="#2563EB" stroke="none"/>
</svg>
