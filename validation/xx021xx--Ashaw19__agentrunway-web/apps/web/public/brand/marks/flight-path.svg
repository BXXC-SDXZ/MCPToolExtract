
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Curved route path (dashed) from lower-left to upper-right with a bend -->
  <path d="M 20 130 C 20 80, 80 80, 100 50 S 160 20, 180 20" stroke-dasharray="6 4"/>
  <!-- Waypoint dots along path -->
  <circle cx="20"  cy="130" r="4" fill="#2563EB" stroke="none"/>
  <circle cx="100" cy="50"  r="4" fill="#2563EB" stroke="none"/>
  <circle cx="180" cy="20"  r="4" fill="#2563EB" stroke="none"/>
  <!-- Arrowhead at destination -->
  <polyline points="168,14 180,20 170,28" fill="none" stroke-dasharray="none"/>
</svg>
