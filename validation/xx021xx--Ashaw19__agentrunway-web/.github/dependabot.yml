version: 2
updates:
  # ─────────────────────────────────────────────────────────────────────────────
  # NPM dependencies — minor + patch only, weekly, single grouped PR
  # ─────────────────────────────────────────────────────────────────────────────
  # Major version bumps are intentionally ignored. They almost always require
  # manual testing and code changes (TypeScript 5→6, ESLint 9→10, Expo 54→55,
  # React 18→19 etc.) and a flood of failing major-bump PRs costs Vercel build
  # minutes for builds that are immediately cancelled. Bump majors manually
  # when you're ready to test them.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    reviewers:
      - "Ashaw19"
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Block all major-version updates across every package.
      # Security updates (which Dependabot handles separately) are unaffected
      # — those still come through immediately regardless of this rule.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

      # ───────────────────────────────────────────────────────────────────────
      # Expo SDK-pinned packages — bump manually with `npx expo install`
      # ───────────────────────────────────────────────────────────────────────
      # These packages are pinned to versions baked into the Expo Go runtime
      # for the current SDK (apps/mobile/node_modules/expo/bundledNativeModules.json).
      # React Native is pre-1.0, so a "minor" bump (e.g. 0.81 -> 0.85) slips
      # through the major-only ignore rule above and breaks Expo Go's JS<->native
      # ABI. Same hazard for React itself and every native module that ships
      # JSI/Fabric bindings. When the SDK ticks, bump these manually by
      # running `npx expo install --check` from apps/mobile/.
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-native"
      - dependency-name: "react-native-*"
      - dependency-name: "expo"
      - dependency-name: "expo-*"
      - dependency-name: "@expo/*"

  # ─────────────────────────────────────────────────────────────────────────────
  # GitHub Actions — weekly, no major bumps
  # ─────────────────────────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    labels:
      - "ci"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
