# Smithery configuration for ReNoUn MCP Server
# https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - apiKey
    properties:
      apiKey:
        type: string
        description: "Your ReNoUn API key (starts with rn_agent_). Get one at https://harrisoncollab.com"
    description: "Structural observability for AI conversations. Detects loops, stuck states, breakthroughs, and convergence patterns across 17 channels."
  commandFunction: |-
    (config) => ({
      command: 'python3',
      args: ['-m', 'server'],
      env: { RENOUN_API_KEY: config.apiKey }
    })
  exampleConfig:
    apiKey: "rn_agent_your_key_here"
