<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <rect width="500" height="500" rx="60" fill="#1e3a5f"/>
  <!-- Medical cross -->
  <rect x="215" y="80" width="70" height="200" rx="8" fill="#ffffff"/>
  <rect x="150" y="145" width="200" height="70" rx="8" fill="#ffffff"/>
  <!-- Stethoscope circle -->
  <circle cx="320" cy="310" r="45" fill="none" stroke="#ffffff" stroke-width="14"/>
  <line x1="320" y1="355" x2="320" y2="390" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <!-- Data dots -->
  <circle cx="160" cy="330" r="12" fill="#ffffff" opacity="0.6"/>
  <circle cx="160" cy="370" r="12" fill="#ffffff" opacity="0.4"/>
  <circle cx="200" cy="350" r="12" fill="#ffffff" opacity="0.5"/>
  <text x="250" y="455" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="38" fill="#ffffff">HEALTHCARE</text>
</svg>
