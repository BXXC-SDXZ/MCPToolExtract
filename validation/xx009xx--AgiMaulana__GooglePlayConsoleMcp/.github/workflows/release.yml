name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update pyproject.toml version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/version = \".*\"/version = \"$VERSION\"/" pyproject.toml

      - name: Update server.json version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 -c "
          import json
          with open('server.json') as f:
              data = json.load(f)
          data['version'] = '$VERSION'
          for pkg in data.get('packages', []):
              pkg['version'] = '$VERSION'
          with open('server.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Commit version bump
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add pyproject.toml server.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "release: v${{ steps.version.outputs.version }}"
            git push origin HEAD:main
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Release ${{ steps.version.outputs.version }}" \
            --target main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish to MCP Registry
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/v1.5.0/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish