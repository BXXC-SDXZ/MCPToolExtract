  #     - name: Checkout
  #       uses: actions/checkout@v6
  #
  #     - name: Setup Node
  #       uses: actions/setup-node@v6
  #       with:
  #         node-version: "22"
  #
  #     - name: Validate server.json
  #       run: |
  #         cd packages/mcp
  #         npx mcp-registry-validator validate server.json
  #
  #     - name: Install MCP Publisher
  #       run: |
  #         curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
  #
  #     - name: Login to MCP Registry
  #       run: ./mcp-publisher login github-oidc
  #
  #     - name: Publish to registry
  #       run: |
  #         cd packages/mcp
  #         ../../mcp-publisher publish

  # -- dgrep CLI -------------------------------------------
  publish_dgrep:
    if: startsWith(github.event.release.tag_name, 'dgrep-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/*/}"
          VERSION="${VERSION#dgrep-v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm (stable)
        if: ${{ !github.event.release.prerelease }}
        run: |
          cd packages/dgrep
          npx npm@latest publish --access public --provenance

      - name: Publish to npm (pre-release)
        if: ${{ github.event.release.prerelease }}
        run: |
          cd packages/dgrep
          npx npm@latest publish --access public --provenance --tag=beta

  # -- TypeScript SDK (@docfork/sdk) -----------------------
  publish_sdk:
    if: startsWith(github.event.release.tag_name, 'sdk-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @docfork/sdk build

      - name: Publish to npm (stable)
        if: ${{ !github.event.release.prerelease }}
        run: |
          cd packages/sdk
          npx npm@latest publish --access public --provenance

      - name: Publish to npm (pre-release)
        if: ${{ github.event.release.prerelease }}
        run: |
          cd packages/sdk
          npx npm@latest publish --access public --provenance --tag=beta
