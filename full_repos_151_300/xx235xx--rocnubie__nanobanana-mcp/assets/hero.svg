<svg
  width="1200"
  height="630"
  viewBox="0 0 1200 630"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="nanobanana-og-title nanobanana-og-desc"
>
  <title id="nanobanana-og-title">Nano Banana Pro AI</title>
  <desc id="nanobanana-og-desc">
    Nano Banana Pro AI image editor - free online AI image generator powered by Google Gemini.
  </desc>
  <defs>
    <linearGradient id="nb-og-bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF8E1" />
      <stop offset="50%" stop-color="#FFFBEB" />
      <stop offset="100%" stop-color="#FFF3D6" />
    </linearGradient>
    <radialGradient id="nb-og-glow" cx="50%" cy="50%" r="60%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="nb-og-banana" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C518" />
      <stop offset="60%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#FFA500" />
    </linearGradient>
    <linearGradient id="nb-og-panel" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#nb-og-bg)" />
  <rect width="1200" height="630" fill="url(#nb-og-glow)" />

  <!-- Decorative banana shape -->
  <ellipse cx="1100" cy="560" rx="280" ry="160" fill="url(#nb-og-banana)" opacity="0.12" transform="rotate(-20 1100 560)" />
  <ellipse cx="200" cy="80" rx="180" ry="100" fill="url(#nb-og-banana)" opacity="0.08" transform="rotate(15 200 80)" />

  <!-- Main card -->
  <rect x="80" y="80" width="1040" height="470" rx="32" fill="url(#nb-og-panel)" stroke="rgba(245,197,24,0.3)" stroke-width="2" />

  <!-- Logo area -->
  <circle cx="160" cy="200" r="64" fill="url(#nb-og-banana)" />
  <circle cx="160" cy="200" r="64" fill="none" stroke="rgba(180,140,50,0.4)" stroke-width="3" />

  <!-- Banana text in logo circle -->
  <text x="160" y="216" text-anchor="middle" fill="#1C1B1F" font-size="52" font-weight="800" font-family="Arial Black, Arial, sans-serif">nB</text>

  <!-- Title -->
  <text x="260" y="215" fill="#1C1B1F" font-size="68" font-weight="800" font-family="Arial Black, Arial, sans-serif" letter-spacing="-2">
    Nano Banana Pro
  </text>
  <text x="260" y="260" fill="#B8860B" font-size="28" font-weight="600" font-family="Arial, sans-serif" letter-spacing="2">
    AI IMAGE EDITOR
  </text>

  <!-- Divider -->
  <rect x="260" y="285" width="700" height="2" rx="1" fill="rgba(245,197,24,0.5)" />

  <!-- Tagline -->
  <text x="260" y="340" fill="#4A3728" font-size="36" font-family="Arial, sans-serif" font-weight="400">
    Free AI Image Editor Online
  </text>
  <text x="260" y="385" fill="#6B5A3E" font-size="26" font-family="Arial, sans-serif" font-weight="400">
    Powered by Google Gemini AI
  </text>

  <!-- Feature pills -->
  <rect x="260" y="410" width="200" height="48" rx="24" fill="#F5C518" />
  <text x="360" y="442" text-anchor="middle" fill="#1C1B1F" font-size="20" font-weight="700" font-family="Arial, sans-serif">Text to Image</text>

  <rect x="480" y="410" width="200" height="48" rx="24" fill="rgba(245,197,24,0.25)" stroke="rgba(245,197,24,0.5)" stroke-width="2" />
  <text x="580" y="442" text-anchor="middle" fill="#6B5A3E" font-size="20" font-weight="700" font-family="Arial, sans-serif">Image to Image</text>

  <rect x="700" y="410" width="200" height="48" rx="24" fill="rgba(245,197,24,0.25)" stroke="rgba(245,197,24,0.5)" stroke-width="2" />
  <text x="800" y="442" text-anchor="middle" fill="#6B5A3E" font-size="20" font-weight="700" font-family="Arial, sans-serif">Image to Video</text>

  <!-- Footer badge area -->
  <rect x="260" y="485" width="180" height="40" rx="20" fill="rgba(245,197,24,0.15)" stroke="rgba(245,197,24,0.4)" stroke-width="1.5" />
  <text x="350" y="512" text-anchor="middle" fill="#B8860B" font-size="18" font-weight="600" font-family="Arial, sans-serif">
    50K+ Happy Users
  </text>

  <rect x="460" y="485" width="180" height="40" rx="20" fill="rgba(245,197,24,0.15)" stroke="rgba(245,197,24,0.4)" stroke-width="1.5" />
  <text x="550" y="512" text-anchor="middle" fill="#B8860B" font-size="18" font-weight="600" font-family="Arial, sans-serif">
    1M+ Images
  </text>

  <!-- Gemini badge -->
  <rect x="960" y="195" width="120" height="44" rx="8" fill="rgba(255,255,255,0.8)" stroke="rgba(245,197,24,0.4)" stroke-width="1.5" />
  <text x="1020" y="224" text-anchor="middle" fill="#4A3728" font-size="16" font-weight="600" font-family="Arial, sans-serif">Gemini</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#F5C518" opacity="0.6" />
  <text x="600" y="618" text-anchor="middle" fill="#6B5A3E" font-size="18" font-weight="600" font-family="Arial, sans-serif" letter-spacing="3">
    nanobanana-ai.online
  </text>
</svg>
