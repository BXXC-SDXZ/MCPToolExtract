minimum_pre_commit_version: "4.0.0"
default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run --no-sync ruff format
        language: system
        types: [python]
      - id: ruff-check
        name: ruff check --fix
        entry: uv run --no-sync ruff check --fix
        language: system
        types: [python]
      - id: pytest
        name: pytest
        entry: uv run --no-sync pytest --cov=openapi_to_mcp --cov-report=term-missing
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
