name: security

on:
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run dependency review
        uses: actions/dependency-review-action@v5
